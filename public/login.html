<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Archive Recover — Sign in</title>
    <style>
      :root {
        --bg: #0a0a0b;
        --surface: #141416;
        --line: #2a2a2e;
        --txt: #f4f4f5;
        --mut: #a1a1aa;
        --brand: #ff5252;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--txt);
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
      }
      .card {
        width: 340px;
        max-width: 90vw;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 30px 26px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        font-size: 18px;
        margin-bottom: 4px;
      }
      .logo .dot {
        width: 28px;
        height: 28px;
        border-radius: 9px;
        background: var(--brand);
        display: grid;
        place-items: center;
        font-size: 15px;
      }
      p {
        color: var(--mut);
        font-size: 13.5px;
        margin: 6px 0 20px;
      }
      input {
        width: 100%;
        height: 46px;
        border-radius: 11px;
        border: 1px solid var(--line);
        background: #0e0e10;
        color: var(--txt);
        padding: 0 14px;
        font-size: 15px;
        outline: none;
      }
      input:focus {
        border-color: #3f3f46;
      }
      button {
        width: 100%;
        height: 46px;
        margin-top: 12px;
        border: 0;
        border-radius: 11px;
        background: var(--brand);
        color: #fff;
        font-weight: 600;
        font-size: 15px;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.08);
      }
      .err {
        color: #fca5a5;
        font-size: 13px;
        margin-top: 12px;
        min-height: 18px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <form class="card" id="f">
      <div class="logo"><span class="dot">▾</span> Archive Recover</div>
      <p>This library is private. Enter the password to continue.</p>
      <input
        id="pw"
        type="password"
        placeholder="Password"
        autofocus
        autocomplete="current-password"
      />
      <button type="submit">Sign in</button>
      <div class="err" id="err"></div>
    </form>
    <script>
      document.getElementById("f").addEventListener("submit", async (e) => {
        e.preventDefault();
        const err = document.getElementById("err");
        err.textContent = "";
        const r = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            password: document.getElementById("pw").value,
          }),
        });
        if (r.ok) {
          location.href = "/";
        } else {
          err.textContent = "Wrong password";
        }
      });
    </script>
  </body>
</html>
